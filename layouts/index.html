{{ define "main" }}
  {{ range .Site.RegularPages.ByDate.Reverse }}
    <div class="post" onclick="location.href='{{ .RelPermalink }}';">
      <!-- Change in order to get the .md file's name/title -->
      <h3>⋆ < {{ .Title }} > </h3>
      {{ .Date.Format "02 January 2006" | lower }}
    </div>
  {{ end }}
{{ end }}
